<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Сканер белья</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0b0e17;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 12px 20px;
            overflow: hidden;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 4px 0 8px;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }
        #scanner-container {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        #scanner-container video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        #status-block {
            width: 100%;
            max-width: 420px;
            margin-top: 12px;
            padding: 8px 12px;
            background: #1a1f2e;
            border-radius: 12px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        #status-text {
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.2s;
            text-align: center;
        }
        #fio-display {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 4px;
            text-align: center;
            min-height: 2.2rem;
            color: #4ade80;
        }
        .status-idle { color: #9ca3af; }
        .status-scanning { color: #facc15; }
        .status-sending { color: #60a5fa; }
        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }

        #manual-block {
            width: 100%;
            max-width: 420px;
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        #manual-block input {
            flex: 1;
            padding: 10px 14px;
            font-size: 1rem;
            border-radius: 10px;
            border: none;
            background: #1a1f2e;
            color: #fff;
            outline: 1px solid #374151;
        }
        #manual-block input:focus {
            outline-color: #3b82f6;
        }
        #manual-block button {
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: #4ade80;
            color: #0b0e17;
            cursor: pointer;
            transition: 0.1s;
        }
        #manual-block button:active {
            background: #22c55e;
            transform: scale(0.96);
        }
        .reload-btn {
            margin-top: 12px;
            padding: 8px 24px;
            font-size: 0.9rem;
            border: none;
            border-radius: 20px;
            background: #374151;
            color: #d1d5db;
            cursor: pointer;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .reload-btn:active {
            background: #4b5563;
        }
        /* мигание при сканировании */
        .blink-border {
            animation: blink 0.6s ease 3;
        }
        @keyframes blink {
            0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
            50% { box-shadow: 0 0 20px 8px rgba(74, 222, 128, 0.3); }
        }
    </style>
</head>
<body>
    <h1>📷 Сканер белья</h1>
    <div id="scanner-container"></div>

    <div id="status-block">
        <div id="status-text" class="status-idle">Ожидание сканирования</div>
        <div id="fio-display"></div>
    </div>

    <div id="manual-block">
        <input type="text" id="barcodeInput" placeholder="Введите код вручную">
        <button onclick="sendManual()">Отправить</button>
    </div>

    <button class="reload-btn" onclick="location.reload();">⟳ Перезапустить камеру</button>

    <script>
        // ================================================================
        //   ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ НА APPS SCRIPT (УЖЕ ЕСТЬ)
        // ================================================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSQLjVqD_K9AYVc2icpwWWij9QCsuQkg2Skjsqiu0V8tY6JAMb7gG0hQG7JeBnYops/exec';
        // ================================================================

        let lastCode = '';
        let processing = false;
        const statusEl = document.getElementById('status-text');
        const fioEl = document.getElementById('fio-display');
        const scannerContainer = document.getElementById('scanner-container');

        function setStatus(text, className) {
            statusEl.textContent = text;
            statusEl.className = className || 'status-idle';
        }

        function setFio(text) {
            fioEl.textContent = text || '';
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.25, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.15);
            } catch (_) {}
        }

        function flashBorder() {
            scannerContainer.classList.remove('blink-border');
            void scannerContainer.offsetWidth; // reflow
            scannerContainer.classList.add('blink-border');
        }

        function sendBarcode(code) {
            if (processing) return;
            processing = true;
            playBeep();
            flashBorder();
            setStatus('📤 Отправка...', 'status-sending');
            setFio('');

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `barcode=${encodeURIComponent(code)}&operation=issue`
            })
            .then(() => {
                setStatus('✅ Успешно!', 'status-success');
                setFio('Код ' + code);
                // здесь можно было бы сделать второй запрос для получения ФИО,
                // но для простоты показываем код.
                setTimeout(() => {
                    setStatus('Готов к сканированию', 'status-idle');
                    setFio('');
                    processing = false;
                }, 2500);
            })
            .catch(err => {
                setStatus('❌ Ошибка: ' + err.message, 'status-error');
                setTimeout(() => {
                    setStatus('Готов к сканированию', 'status-idle');
                    processing = false;
                }, 2500);
            });
        }

        function onDetected(result) {
            const code = result.codeResult.code;
            if (code && code !== lastCode && !processing) {
                lastCode = code;
                sendBarcode(code);
                setTimeout(() => { lastCode = ''; }, 3000);
            }
        }

        function sendManual() {
            const input = document.getElementById('barcodeInput');
            const code = input.value.trim();
            if (code && !processing) {
                input.value = '';
                sendBarcode(code);
            }
        }

        function initScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: {
                        width: { min: 360 },
                        height: { min: 360 },
                        facingMode: "environment"
                    }
                },
                decoder: { readers: ["ean_reader"] }
            }, function(err) {
                if (err) {
                    setStatus('❌ Ошибка камеры: ' + err.message, 'status-error');
                    return;
                }
                Quagga.start();
                setStatus('🔍 Сканирование...', 'status-scanning');
            });
            Quagga.onDetected(onDetected);
        }

        window.onload = initScanner;

        // Обработка ввода по клавише Enter
        document.getElementById('barcodeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendManual();
        });
    </script>
</body>
</html>
